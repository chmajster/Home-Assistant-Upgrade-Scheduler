name: HA AutoUpgrade
version: 1.0.10
slug: ha_auto_upgrade
description: Intelligent, policy-driven, safety-first update automation for Home Assistant
url: https://github.com/Chris/Home-Assistant-Upgrade-Scheduler
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:update
panel_title: HA AutoUpgrade
homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: true
apparmor: true
map:
  - addon_config:rw
  - backup:rw
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Local status API (optional, ingress preferred)
options:
  check_interval_minutes: 60
  install_days: sun
  install_hour: "03:00"
  auto_install: false
  create_backup: true
schema:
  check_interval_minutes: int
  install_days: str
  install_hour: str
  auto_install: bool
  create_backup: bool
