name: HA AutoUpgrade
version: 1.0.0
slug: ha_auto_upgrade
description: Intelligent, policy-driven, safety-first update automation for Home Assistant
url: https://github.com/Chris/Home-Assistant-Upgrade-Scheduler
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:update
panel_title: HA AutoUpgrade
homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: true
apparmor: true
map:
  - addon_config:rw
  - backup:rw
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Local status API (optional, ingress preferred)
options:
  log_level: info
  json_logs: false
  dry_run: false
  notify_only_mode: false
  check_only_mode: false
  security_only_mode: false
  enabled_update_types:
    - core
    - supervisor
    - os
    - addons
  update_strategy: addons_last
  excluded_addons: []
  pinned_versions: []
  minimum_required_versions: []
  staged_rollout_enabled: false
  staged_rollout_percent: 100
  staged_rollout_seed: default
  max_updates_per_run: 0
  delay_between_updates_seconds: 45
  create_backup: true
  backup_mode: full
  backup_password: ""
  backup_retention: 5
  backup_partial_addons: []
  rollback_on_failure: false
  schedule_check_interval_minutes: 60
  schedule_install_interval_minutes: 360
  schedule_check_cron: ""
  schedule_install_cron: ""
  schedule_check_weekday_time: ""
  schedule_install_weekday_time: "sun@03:00"
  schedule_allowed_weekdays:
    - mon
    - tue
    - wed
    - thu
    - fri
    - sat
    - sun
  schedule_jitter_seconds: 90
  maintenance_window: "22:00-06:00"
  blackout_dates: []
  min_free_disk_mb: 1024
  max_cpu_load_1m: 5.0
  min_free_memory_mb: 256
  api_retry_max_attempts: 4
  api_retry_backoff_seconds: 2
  cooldown_minutes_after_failure: 120
  min_minutes_between_runs: 30
  safe_mode_failure_threshold: 3
  safe_mode_minutes: 240
  watchdog_enabled: false
  watchdog_timeout_minutes: 45
  ups_status_entity: ""
  ups_required_state: "on"
  approval_entity: ""
  require_entity_states: []
  skip_if_someone_home_entity: ""
  skip_if_media_playing_entity: ""
  skip_if_critical_mode_entity: ""
  skip_if_alarm_armed_away_entity: ""
  skip_if_vacuum_cleaning_entity: ""
  unstable_binary_sensor_entity: ""
  maintenance_mode_service: ""
  maintenance_mode_restore_service: ""
  pre_update_services: []
  post_update_services: []
  pre_update_entities_on: []
  pre_update_entities_off: []
  post_update_restart_addons: []
  post_update_notify: true
  notification_enable_start: true
  notification_enable_success: true
  notification_enable_partial: true
  notification_enable_failure: true
  notification_enable_skip: true
  notify_persistent: true
  notify_services: []
  notify_webhook_url: ""
  notify_webhook_token: ""
  smtp_enabled: false
  smtp_host: ""
  smtp_port: 587
  smtp_username: ""
  smtp_password: ""
  smtp_from: ""
  smtp_to: ""
  webhook_trigger_token: ""
  export_redact_secrets: true
schema:
  log_level: list(debug|info|warning|error)?
  json_logs: bool?
  dry_run: bool?
  notify_only_mode: bool?
  check_only_mode: bool?
  security_only_mode: bool?
  enabled_update_types: list(str)?
  update_strategy: str?
  excluded_addons: list(str)?
  pinned_versions: list(str)?
  minimum_required_versions: list(str)?
  staged_rollout_enabled: bool?
  staged_rollout_percent: int?
  staged_rollout_seed: str?
  max_updates_per_run: int?
  delay_between_updates_seconds: int?
  create_backup: bool?
  backup_mode: str?
  backup_password: password?
  backup_retention: int?
  backup_partial_addons: list(str)?
  rollback_on_failure: bool?
  schedule_check_interval_minutes: int?
  schedule_install_interval_minutes: int?
  schedule_check_cron: str?
  schedule_install_cron: str?
  schedule_check_weekday_time: str?
  schedule_install_weekday_time: str?
  schedule_allowed_weekdays: list(str)?
  schedule_jitter_seconds: int?
  maintenance_window: str?
  blackout_dates: list(str)?
  min_free_disk_mb: int?
  max_cpu_load_1m: float?
