name: HA AutoUpgrade
description: Inteligentna, oparta na politykach automatyzacja aktualizacji Home Assistant
configuration:
  check_interval_minutes:
    name: Interwal sprawdzania w minutach
    description: Jak czesto dodatek ma sprawdzac dostepne aktualizacje.
  auto_install:
    name: Instaluj automatycznie
    description: Jesli wlaczone, zaplanowane sprawdzenia moga tez automatycznie instalowac aktualizacje.
  log_level:
    name: Poziom logowania
    description: Szczegolowosc logow w Supervisorze i lokalnym panelu.
  json_logs:
    name: Logi JSON
    description: Emituj logi jako linie JSON zamiast tekstu czytelnego dla czlowieka.
  dry_run:
    name: Tryb testowy
    description: Symuluj kontrole i plan bez wykonywania aktualizacji.
  notify_only_mode:
    name: Tylko powiadomienia
    description: Wykrywaj aktualizacje i wysylaj powiadomienia, ale ich nie instaluj.
  check_only_mode:
    name: Tylko sprawdzanie
    description: Zablokuj instalacje i pozostaw dodatek w trybie wykrywania.
  security_only_mode:
    name: Tylko bezpieczenstwo
    description: Preferuj aktualizacje oznaczone jako bezpieczenstwa albo poprawki patch, gdy brak klasyfikacji.
  enabled_update_types:
    name: Dozwolone typy aktualizacji
    description: Wybierz kategorie komponentow dopuszczone do automatycznej aktualizacji.
  update_strategy:
    name: Strategia aktualizacji
    description: Steruje kolejnoscia aktualizacji komponentow.
  excluded_addons:
    name: Wykluczone dodatki
    description: Slugi dodatkow, ktore nigdy nie maja byc aktualizowane automatycznie.
  pinned_versions:
    name: Przypiete wersje
    description: Wpisy blokady wersji w formacie komponent_lub_slug=wersja.
  minimum_required_versions:
    name: Minimalne wymagane wersje
    description: Odrzucaj cele aktualizacji ponizej tych wymagan.
  staged_rollout_enabled:
    name: Etapowe wdrazanie
    description: Wlacz procentowy wybor dodatkow w etapowym trybie wdrazania.
  staged_rollout_percent:
    name: Procent wdrozenia
    description: Procent kwalifikujacych sie dodatkow dopuszczonych do aktualizacji.
  create_backup:
    name: Tworz kopie zapasowa
    description: Tworz kopie zapasowa Supervisor przed instalacja.
  backup_mode:
    name: Tryb kopii zapasowej
    description: Pelna albo czesciowa kopia zapasowa.
  backup_retention:
    name: Retencja kopii
    description: Liczba kopii utworzonych przez HA AutoUpgrade do zachowania.
  rollback_on_failure:
    name: Przywroc po bledzie
    description: Po nieudanej aktualizacji zglos pelne odtworzenie z utworzonej kopii.
  schedule_check_interval_minutes:
    name: Interwal sprawdzania
    description: Liczba minut pomiedzy sprawdzeniami przy harmonogramie interwalowym.
  schedule_install_interval_minutes:
    name: Interwal instalacji
    description: Liczba minut pomiedzy uruchomieniami instalacji przy harmonogramie interwalowym.
  schedule_check_cron:
    name: Cron sprawdzania
    description: Opcjonalne wyrazenie cron dla sprawdzen aktualizacji.
  schedule_install_cron:
    name: Cron instalacji
    description: Opcjonalne wyrazenie cron dla uruchomien instalacji.
  schedule_install_weekday_time:
    name: Dzien/godzina instalacji
    description: Opcjonalny staly harmonogram w formacie sun@03:00.
  maintenance_window:
    name: Okno serwisowe
    description: Dozwolony zakres czasu dla instalacji, na przyklad 22:00-06:00.
  blackout_dates:
    name: Daty blokady
    description: Daty, w ktorych uruchomienia sa blokowane, opcjonalnie z opisem YYYY-MM-DD:etykieta.
  min_free_disk_mb:
    name: Minimalne wolne miejsce
    description: Zablokuj uruchomienie, jesli wolne miejsce spadnie ponizej progu.
  max_cpu_load_1m:
    name: Maksymalne obciazenie CPU
    description: Zablokuj uruchomienie, jesli obciazenie 1-minutowe przekroczy prog.
  min_free_memory_mb:
    name: Minimalna wolna pamiec
    description: Zablokuj uruchomienie, jesli wolna pamiec spadnie ponizej progu.
  approval_entity:
    name: Encja zatwierdzajaca
    description: Opcjonalna encja pomocnicza, ktora musi byc wlaczona przed aktualizacja.
  require_entity_states:
    name: Wymagane stany encji
    description: Reguly encja=stan, ktore musza wszystkie pasowac.
  notify_services:
    name: Serwisy powiadomien
    description: Serwisy notify Home Assistant uzywane do wysylania zdarzen.
  notify_webhook_url:
    name: URL webhooka powiadomien
    description: Opcjonalny webhook do wysylania statusow.
  smtp_enabled:
    name: SMTP wlaczone
    description: Wlacz powiadomienia e-mail przez serwer SMTP.
  webhook_trigger_token:
    name: Token wyzwalacza webhook
    description: Token Bearer lub token w query dla zewnetrznego endpointu wyzwalajacego.
